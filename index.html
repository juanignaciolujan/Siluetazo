<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Siluetazo — prototipo</title>

<!-- =========================================================
     LIBRERIAS (se cargan desde CDN, no necesitan instalacion).
     Corren la segmentacion en el propio celular. La foto NUNCA
     se sube a ningun lado: lo unico que viaja por la red es el
     modelo que baja una vez, no la imagen.
     ========================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>

<style>
  /* =========================================================
     PALETA (materiales del Siluetazo: muro, papel, tinta).
     Cambia estos valores para reajustar todo el tono de una.
     ========================================================= */
  :root{
    --muro:    #15130f;  /* fondo, pared oscura */
    --papel:   #c7b89c;  /* papel kraft donde aparece la sombra */
    --tinta:   #0c0b0a;  /* negro de la silueta */
    --rojo:    #8f3b2e;  /* acento minimo, el rojo del activismo grafico */
    --texto:   #e8e2d4;
    --apagado: #8a8270;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; height:100%;
    background:var(--muro); color:var(--texto);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior:none;
  }

  .eyebrow{
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--apagado);
  }
  .eyebrow b{ color:var(--rojo); font-weight:700; }

  #app{
    height:100dvh; display:flex; flex-direction:column;
    padding:max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
  }

  header{ flex:0 0 auto; }
  header h1{ margin:.4em 0 0; font-size:clamp(22px,7vw,30px); font-weight:800; letter-spacing:-.01em; line-height:1.05; }

  .stage{
    flex:1 1 auto; position:relative; margin:16px 0; border-radius:3px; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:#0b0a08; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .stage.is-paper{ background:var(--papel); } /* al revelar la sombra */

  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* mensajes centrados (intro, procesando, error) */
  .panel{ position:relative; z-index:2; text-align:center; padding:0 26px; max-width:32ch; }
  .panel p{ color:var(--apagado); font-size:15px; line-height:1.5; margin:.5em 0; }
  .panel .sub{ font-size:12px; color:#6a6353; }

  /* punto que late mientras procesa */
  .pulso{ width:14px; height:14px; border-radius:50%; background:var(--rojo); margin:0 auto 14px; animation:latir 1.1s ease-in-out infinite; }
  @keyframes latir{ 0%,100%{ transform:scale(.7); opacity:.5 } 50%{ transform:scale(1); opacity:1 } }
  @media (prefers-reduced-motion: reduce){ .pulso{ animation:none } }

  footer{ flex:0 0 auto; display:flex; gap:10px; }
  .btn{
    flex:1; appearance:none; border:0; cursor:pointer; padding:16px; border-radius:3px;
    font-size:15px; font-weight:700; background:var(--texto); color:var(--muro);
    transition:transform .08s ease, opacity .2s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn:disabled{ opacity:.35; pointer-events:none; }
  .btn--ghost{ background:transparent; color:var(--apagado); box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }

  .reveal{ animation:reveal .9s ease both; }
  @keyframes reveal{ from{ opacity:0; transform:scale(.97) } to{ opacity:1; transform:scale(1) } }
  @media (prefers-reduced-motion: reduce){ .reveal{ animation:none } }

  .hidden{ display:none !important; }
  input[type=file]{ display:none; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="eyebrow">Relevamiento · <b>30.000</b></div>
    <h1>Tu cuerpo, una silueta.</h1>
  </header>

  <div class="stage" id="stage">
    <!-- paso 0: invitacion -->
    <div class="panel" id="intro">
      <p>Sacá o elegí una foto de una persona. La figura se va a separar del fondo y volverse silueta.</p>
    </div>

    <!-- paso 1: procesando -->
    <div class="panel hidden" id="procesando">
      <div class="pulso"></div>
      <p id="procesandoMsg">Buscando la figura…</p>
      <p class="sub" id="procesandoSub"></p>
    </div>

    <!-- paso error -->
    <div class="panel hidden" id="errorPanel">
      <p id="errorMsg"></p>
    </div>

    <!-- el canvas pinta la silueta final -->
    <canvas id="lienzo" class="hidden"></canvas>
  </div>

  <footer>
    <label class="btn" id="btnFoto">Sacar o elegir foto
      <input type="file" id="archivo" accept="image/*">
    </label>
    <button class="btn btn--ghost hidden" id="btnReset">Empezar de nuevo</button>
  </footer>

</div>

<script>
/* =========================================================
   PROTOTIPO — foto a silueta automatica, todo en el navegador.
   El modelo separa la persona del fondo y la rellenamos de negro.
   La foto se procesa en el dispositivo y no se sube a ningun lado.
   ========================================================= */

const stage     = document.getElementById('stage');
const intro     = document.getElementById('intro');
const procesando= document.getElementById('procesando');
const procSub   = document.getElementById('procesandoSub');
const errorPanel= document.getElementById('errorPanel');
const errorMsg  = document.getElementById('errorMsg');
const lienzo    = document.getElementById('lienzo');
const archivo   = document.getElementById('archivo');
const btnFoto   = document.getElementById('btnFoto');
const btnReset  = document.getElementById('btnReset');
const ctx = lienzo.getContext('2d');

/* ---- carga del modelo (una sola vez, cacheada) ---- */
let segmentador = null;
let cargando = null;

async function prepararSegmentador(){
  if(segmentador) return segmentador;
  if(!cargando){
    cargando = (async ()=>{
      await tf.ready();
      return bodySegmentation.createSegmenter(
        bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation,
        { runtime:'mediapipe',
          solutionPath:'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation',
          modelType:'general' }   // 'general' es mas preciso; 'landscape' mas rapido
      );
    })()
    .then(s => { segmentador = s; return s; })
    .catch(err => { cargando = null; throw err; }); // permite reintentar
  }
  return cargando;
}
// arranca a bajar el modelo apenas carga la pagina, para que este listo despues
window.addEventListener('load', ()=> prepararSegmentador().catch(()=>{}));

/* ---- ajusta el canvas a su tamaño real, considerando pantallas retina ---- */
function ajustarLienzo(){
  const r = stage.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  lienzo.width  = Math.round(r.width  * dpr);
  lienzo.height = Math.round(r.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return r;
}

/* ---- dibuja la mascara (silueta negra) encuadrada sobre el papel ---- */
function dibujarSilueta(maskData){
  const r = ajustarLienzo();
  ctx.clearRect(0, 0, r.width, r.height);
  const off = document.createElement('canvas');
  off.width = maskData.width; off.height = maskData.height;
  off.getContext('2d').putImageData(maskData, 0, 0);
  const escala = Math.min(r.width / off.width, r.height / off.height);
  const w = off.width * escala, h = off.height * escala;
  ctx.drawImage(off, (r.width - w)/2, (r.height - h)/2, w, h);
}

/* ---- mide cuanta superficie quedo como figura, para detectar fotos sin gente ---- */
function proporcionFigura(maskData){
  const d = maskData.data; let opacos = 0;
  for(let i = 3; i < d.length; i += 4){ if(d[i] > 0) opacos++; }
  return opacos / (d.length / 4);
}

/* ---- cambia de paso mostrando/ocultando paneles ---- */
function mostrar(paso){
  intro.classList.toggle('hidden', paso !== 'intro');
  procesando.classList.toggle('hidden', paso !== 'procesando');
  errorPanel.classList.toggle('hidden', paso !== 'error');
  lienzo.classList.toggle('hidden', paso !== 'silueta');
  stage.classList.toggle('is-paper', paso === 'silueta');
  btnFoto.classList.toggle('hidden', paso === 'procesando' || paso === 'silueta');
  btnReset.classList.toggle('hidden', paso !== 'silueta' && paso !== 'error');
  btnReset.textContent = paso === 'error' ? 'Probar otra foto' : 'Empezar de nuevo';
}

/* ====================== FLUJO ====================== */
archivo.addEventListener('change', e=>{
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = ()=> procesar(img);
  img.onerror = ()=> falla('No se pudo abrir esa imagen. Probá con otra.');
  img.src = URL.createObjectURL(file);
});

async function procesar(img){
  mostrar('procesando');
  procSub.textContent = segmentador ? '' : 'Primera vez: el modelo baja una vez y puede tardar unos segundos.';
  try{
    const seg = await prepararSegmentador();
    const personas = await seg.segmentPeople(img, { flipHorizontal:false });
    const mask = await bodySegmentation.toBinaryMask(
      personas,
      { r:0, g:0, b:0, a:255 },  // figura: negro opaco
      { r:0, g:0, b:0, a:0 },    // fondo: transparente
      false,                     // sin contorno
      0.5                        // umbral
    );
    if(proporcionFigura(mask) < 0.01){
      falla('No se encontró una figura clara. Probá con una foto donde la persona se distinga del fondo.');
      return;
    }
    dibujarSilueta(mask);
    lienzo.classList.add('reveal');
    mostrar('silueta');
  }catch(err){
    console.error(err);
    falla('No se pudo cargar el modelo. Revisá la conexión y volvé a intentar.');
  }
}

function falla(msg){
  errorMsg.textContent = msg;
  lienzo.classList.remove('reveal');
  mostrar('error');
}

function reiniciar(){
  archivo.value = '';
  lienzo.classList.remove('reveal');
  ctx.clearRect(0, 0, lienzo.width, lienzo.height);
  mostrar('intro');
}
btnReset.addEventListener('click', reiniciar);
</script>
</body>
</html>
